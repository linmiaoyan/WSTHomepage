# Example nginx reverse proxy for WSTHomepage.
# Public traffic terminates on 80/443 and is proxied to the main app on
# 127.0.0.1:8000. Keep 8000/8001/8002 closed to the Internet.
#
# This example assumes SINGLE_PORT=1, so QuickVote and TeacherDataSystem are
# available below /quickvote/ and /teacher-data/ through the main app.

server {
    listen 80;
    server_name example.com;

    # If TLS is configured, redirect HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # Replace with your certificate paths.
    ssl_certificate     /etc/nginx/ssl/example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/example.com/privkey.pem;

    client_max_body_size 80m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;

    # Main portal and all SINGLE_PORT subpaths:
    #   /quickvote/    -> QuickVote
    #   /teacher-data/ -> TeacherDataSystem
    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
