<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>问卷制作与统计</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
    <style>
        .wrap { max-width: 1000px; margin: 18px auto; padding: 0 14px 24px; }
        .cardx {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .muted { color: var(--text-secondary); font-size: 13px; }
        .link-box { font-size: 12px; word-break: break-all; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="cardx mb-3">
        <div class="h5 mb-1"><i class="bi bi-ui-checks-grid"></i> 问卷制作与统计</div>
        <div class="muted">仅在管理中心内使用。对外请分发「填写链接」；填写人提交后跳转到感谢页，不会看到本页。</div>
    </div>

    <div class="cardx mb-3">
        <div class="fw-semibold mb-2"><i class="bi bi-plus-lg"></i> 新建问卷</div>
        <div class="row g-2 align-items-end">
            <div class="col-md-8">
                <label class="form-label" for="newTitle">标题</label>
                <input type="text" class="form-control" id="newTitle" placeholder="例如：实验室满意度调查" />
            </div>
            <div class="col-md-4">
                <button type="button" class="btn btn-primary w-100" id="btnCreate"><i class="bi bi-check2"></i> 创建</button>
            </div>
        </div>
        <div class="muted mt-2">创建后可在下方编辑题目（单选 / 简答），并复制对外链接。</div>
    </div>

    <div class="cardx mb-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
            <div class="fw-semibold"><i class="bi bi-collection"></i> 问卷列表</div>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="btnReload"><i class="bi bi-arrow-clockwise"></i> 重新加载</button>
        </div>
        <div id="surveyList" class="muted">加载中…</div>
    </div>

    <div class="cardx" id="editorWrap" style="display:none;">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">
            <div>
                <div class="fw-semibold" id="edTitle"></div>
                <div class="muted small">问卷 ID：<span class="mono" id="edId"></span></div>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-sm btn-outline-primary" id="btnCopyLink"><i class="bi bi-link-45deg"></i> 复制填写链接</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" id="btnExportSurvey"><i class="bi bi-download"></i> 导出问卷 JSON</button>
            </div>
        </div>
        <div class="alert alert-light border py-2 small link-box mb-3" id="fillUrlBox"></div>

        <div class="fw-semibold mb-2">题目</div>
        <div id="questions"></div>
        <div class="mt-2 d-flex flex-wrap gap-2">
            <button type="button" class="btn btn-sm btn-outline-primary" id="btnAddRadio"><i class="bi bi-ui-radios"></i> 添加单选题</button>
            <button type="button" class="btn btn-sm btn-outline-primary" id="btnAddText"><i class="bi bi-textarea-resize"></i> 添加简答题</button>
            <button type="button" class="btn btn-sm btn-success" id="btnSaveSurvey"><i class="bi bi-save"></i> 保存问卷</button>
        </div>

        <hr />
        <div class="fw-semibold mb-2"><i class="bi bi-bar-chart-line"></i> 回收记录</div>
        <div id="respBox" class="small muted">暂无</div>
    </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    var STORE_S = "wst_qv_surveys_v1";
    var STORE_R = "wst_qv_responses_v1";

    function esc(s) {
        if (s === null || s === undefined) return "";
        return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    function uid() {
        return "sv_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function loadStore() {
        try {
            var o = JSON.parse(localStorage.getItem(STORE_S) || "{}");
            return o && typeof o === "object" ? o : {};
        } catch (e) {
            return {};
        }
    }
    function saveStore(map) {
        localStorage.setItem(STORE_S, JSON.stringify(map));
    }
    function loadResp() {
        try {
            var o = JSON.parse(localStorage.getItem(STORE_R) || "{}");
            return o && typeof o === "object" ? o : {};
        } catch (e) {
            return {};
        }
    }

    var surveys = {};
    var currentId = null;

    function fillUrl(id) {
        try {
            var u = new URL(location.href);
            u.pathname = u.pathname.replace(/[^/]+$/, "quickvote-fill.html");
            u.search = "?id=" + encodeURIComponent(id);
            u.hash = "";
            return u.toString();
        } catch (e) {
            return location.origin + "/pages/quickvote-fill.html?id=" + encodeURIComponent(id);
        }
    }

    function renderList() {
        var el = document.getElementById("surveyList");
        var keys = Object.keys(surveys);
        if (!keys.length) {
            el.innerHTML = '<span class="text-secondary">暂无问卷，请先创建。</span>';
            return;
        }
        el.innerHTML = '<div class="list-group">' + keys.map(function (id) {
            var s = surveys[id] || {};
            return (
                '<button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" data-id="' +
                esc(id) + '">' +
                '<span>' + esc(s.title || id) + '</span>' +
                '<span class="badge text-bg-light">' + esc(id) + '</span>' +
                '</button>'
            );
        }).join("") + "</div>";
        el.querySelectorAll("button[data-id]").forEach(function (btn) {
            btn.addEventListener("click", function () {
                openEditor(btn.getAttribute("data-id"));
            });
        });
    }

    function openEditor(id) {
        currentId = id;
        var s = surveys[id];
        if (!s) return;
        document.getElementById("editorWrap").style.display = "";
        document.getElementById("edTitle").textContent = s.title || "（未命名）";
        document.getElementById("edId").textContent = id;
        var u = fillUrl(id);
        document.getElementById("fillUrlBox").textContent = u;
        renderQuestions(s);
        renderResponses(id);
    }

    function renderQuestions(s) {
        var box = document.getElementById("questions");
        var qs = Array.isArray(s.questions) ? s.questions : [];
        if (!qs.length) {
            box.innerHTML = '<div class="muted">暂无题目，请添加。</div>';
            return;
        }
        box.innerHTML = qs.map(function (q, idx) {
            var head = '<div class="border rounded p-2 mb-2 bg-light"><div class="d-flex justify-content-between"><span class="fw-semibold small">Q' + (idx + 1) + "</span>" +
                '<button type="button" class="btn btn-link btn-sm text-danger p-0" data-del="' + idx + '">删除</button></div>';
            if (q.type === "radio") {
                var opts = Array.isArray(q.options) ? q.options : [];
                head += '<input class="form-control form-control-sm mb-1" data-k="text" data-i="' + idx + '" value="' + esc(q.text || "") + '" placeholder="题干" />';
                head += '<div class="small text-secondary mb-1">选项（每行一项）</div>';
                head += '<textarea class="form-control form-control-sm" rows="3" data-k="opts" data-i="' + idx + '">' + esc(opts.join("\n")) + "</textarea>";
            } else {
                head += '<input class="form-control form-control-sm" data-k="text" data-i="' + idx + '" value="' + esc(q.text || "") + '" placeholder="简答题题干" />';
            }
            head += "</div>";
            return head;
        }).join("");

        box.querySelectorAll("input[data-k],textarea[data-k]").forEach(function (el) {
            el.addEventListener("change", function () {
                var i = parseInt(el.getAttribute("data-i"), 10);
                var k = el.getAttribute("data-k");
                var cur = surveys[currentId];
                if (!cur || !cur.questions || !cur.questions[i]) return;
                if (k === "text") cur.questions[i].text = el.value;
                if (k === "opts") {
                    cur.questions[i].options = el.value.split(/\r?\n/).map(function (x) { return x.trim(); }).filter(Boolean);
                }
                saveStore(surveys);
            });
        });
        box.querySelectorAll("button[data-del]").forEach(function (btn) {
            btn.addEventListener("click", function () {
                var idx = parseInt(btn.getAttribute("data-del"), 10);
                var cur = surveys[currentId];
                if (!cur || !cur.questions) return;
                cur.questions.splice(idx, 1);
                saveStore(surveys);
                openEditor(currentId);
            });
        });
    }

    function renderResponsesList(list, box) {
        if (!list.length) {
            box.innerHTML = "暂无提交。";
            return;
        }
        box.innerHTML = list.map(function (r, i) {
            var ans = r.answers != null ? r.answers : (r.payload && r.payload.answers);
            var t = r.submitted_at || "";
            return '<div class="border rounded p-2 mb-2"><div class="text-secondary small">' + (i + 1) + " · " + t + '</div><pre class="mb-0 small">' +
                JSON.stringify(ans || {}, null, 2) + "</pre></div>";
        }).join("");
    }

    function renderResponses(id) {
        var box = document.getElementById("respBox");
        box.innerHTML = "加载中…";
        fetch("/api/quickvote/responses/" + encodeURIComponent(id), { credentials: "same-origin" })
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (d && d.ok && Array.isArray(d.data) && d.data.length) {
                    renderResponsesList(d.data, box);
                    return;
                }
                throw new Error("local");
            })
            .catch(function () {
                var all = loadResp();
                var list = Array.isArray(all[id]) ? all[id] : [];
                if (!list.length) {
                    box.innerHTML = "暂无提交（服务端无记录且本机无缓存）。";
                    return;
                }
                renderResponsesList(list, box);
            });
    }

    function syncFromServer() {
        fetch("/api/quickvote/surveys", { credentials: "same-origin" })
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (d && d.ok && d.data && typeof d.data === "object") {
                    surveys = d.data;
                    saveStore(surveys);
                    renderList();
                }
            })
            .catch(function () {});
    }

    document.getElementById("btnCreate").addEventListener("click", function () {
        var t = (document.getElementById("newTitle").value || "").trim();
        if (!t) {
            alert("请填写标题");
            return;
        }
        fetch("/api/quickvote/survey", {
            method: "POST",
            credentials: "same-origin",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ title: t, questions: [] })
        })
            .then(function (r) { return r.json().then(function (d) { return { r: r, d: d }; }); })
            .then(function (_ref) {
                var r = _ref.r;
                var d = _ref.d;
                if (r.ok && d && d.ok && d.id) {
                    surveys[d.id] = { title: t, questions: [] };
                    saveStore(surveys);
                    document.getElementById("newTitle").value = "";
                    renderList();
                    openEditor(d.id);
                    return;
                }
                throw new Error("local");
            })
            .catch(function () {
                var id = uid();
                surveys[id] = { title: t, questions: [] };
                saveStore(surveys);
                document.getElementById("newTitle").value = "";
                renderList();
                openEditor(id);
            });
    });

    document.getElementById("btnAddRadio").addEventListener("click", function () {
        if (!currentId || !surveys[currentId]) return;
        surveys[currentId].questions.push({ id: "q_" + Date.now(), type: "radio", text: "新建单选题", options: ["选项A", "选项B"] });
        saveStore(surveys);
        openEditor(currentId);
    });
    document.getElementById("btnAddText").addEventListener("click", function () {
        if (!currentId || !surveys[currentId]) return;
        surveys[currentId].questions.push({ id: "q_" + Date.now(), type: "text", text: "新建简答题" });
        saveStore(surveys);
        openEditor(currentId);
    });
    document.getElementById("btnSaveSurvey").addEventListener("click", function () {
        if (!currentId || !surveys[currentId]) return;
        saveStore(surveys);
        var body = surveys[currentId];
        fetch("/api/quickvote/survey/" + encodeURIComponent(currentId), {
            method: "PUT",
            credentials: "same-origin",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(body)
        })
            .then(function (r) { return r.json().then(function (d) { return { r: r, d: d }; }); })
            .then(function (_ref) {
                var r = _ref.r;
                var d = _ref.d;
                if (r.ok && d && d.ok) {
                    alert("已保存到服务器。");
                    return;
                }
                throw new Error("local");
            })
            .catch(function () {
                alert("已保存到本机存储；服务器不可用或保存失败。");
            });
    });

    document.getElementById("btnCopyLink").addEventListener("click", function () {
        if (!currentId) return;
        var u = fillUrl(currentId);
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(u).then(function () { alert("已复制：" + u); }).catch(function () { prompt("复制以下链接", u); });
        } else {
            prompt("复制以下链接", u);
        }
    });
    document.getElementById("btnExportSurvey").addEventListener("click", function () {
        if (!currentId) return;
        var blob = new Blob([JSON.stringify(surveys[currentId], null, 2)], { type: "application/json;charset=utf-8" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = currentId + ".json";
        a.click();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 500);
    });

    document.getElementById("btnReload").addEventListener("click", function () {
        surveys = loadStore();
        renderList();
        if (currentId && surveys[currentId]) openEditor(currentId);
    });

    surveys = loadStore();
    renderList();
    syncFromServer();
})();
</script>
</body>
</html>
