<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理中心 · 审批 / 教师数据 / 问卷</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/bootstrap-icons.css" />
    <style>
        .tab-bar {
            max-width: 1000px;
            margin: 20px auto 0;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .tab-row-label {
            flex: 0 0 100%;
            font-size: 12px;
            color: var(--text-secondary);
            margin: 4px 0 2px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .tab-btn {
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--bg-white);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .tab-btn.active {
            background: var(--primary-blue);
            color: #fff;
            border-color: var(--primary-blue);
        }
        .page-frame-wrap {
            max-width: 1000px;
            margin: 10px auto 20px;
            padding: 0 20px 20px;
        }
        .page-frame {
            width: 100%;
            height: min(78vh, 860px);
            min-height: 560px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            background: #fff;
        }
        .gate-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .gate-card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.75rem 2rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.25);
            width: 320px;
            border: 1px solid var(--border-color);
        }
        .gate-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }
        .gate-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .gate-input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 13px;
            box-sizing: border-box;
        }
        .gate-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2);
        }
        .gate-btn {
            margin-top: 0.75rem;
            width: 100%;
            border: none;
            border-radius: 6px;
            padding: 6px 0;
            background: var(--primary-blue);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .gate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .gate-error {
            margin-top: 0.5rem;
            font-size: 12px;
            color: var(--danger-color);
        }
        a.tab-external {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-container">
            <a class="nav-link" href="home.html"><i class="bi bi-house-door"></i> 门户首页</a>
            <a class="nav-link active" href="index.html"><i class="bi bi-speedometer2"></i> 管理中心</a>
        </div>
    </nav>

    <div class="tab-bar" id="tabBar" style="display:none;">
        <div class="tab-row-label">审批（按类型分标签）</div>
        <button type="button" class="tab-btn active" data-page="/pages/admin-review.html"><i class="bi bi-inboxes"></i> 全部待办</button>
        <button type="button" class="tab-btn" data-page="/pages/admin-review.html?type=add_vehicle"><i class="bi bi-car-front"></i> 审批 · 车牌</button>
        <button type="button" class="tab-btn" data-page="/pages/admin-review.html?type=leave_cycle"><i class="bi bi-calendar2-week"></i> 审批 · 周期请假</button>
        <button type="button" class="tab-btn" data-page="/pages/admin-review.html?type=reset_net_password"><i class="bi bi-key"></i> 审批 · 网络密码</button>
        <button type="button" class="tab-btn" data-page="/pages/admin-review.html?type=seal"><i class="bi bi-patch-check"></i> 审批 · 校章</button>

        <div class="tab-row-label">原版子系统（新标签打开，与主站端口不同）</div>
        <a class="tab-btn tab-external" href="/go/quickvote" target="_blank" rel="noopener"><i class="bi bi-qr-code"></i> 民主测评 QuickVote</a>
        <a class="tab-btn tab-external" href="/go/teacher-data-system" target="_blank" rel="noopener"><i class="bi bi-database"></i> 教师数据系统</a>

        <div class="tab-row-label">数据与问卷（主站内嵌 · 轻量占位）</div>
        <button type="button" class="tab-btn" data-page="/pages/teacher-data-admin.html"><i class="bi bi-person-vcard"></i> 教师数据（简化）</button>
        <button type="button" class="tab-btn" data-page="/pages/quickvote-admin.html"><i class="bi bi-ui-checks-grid"></i> 问卷（简化）</button>

        <div class="tab-row-label">快捷操作</div>
        <button type="button" class="tab-btn" data-page="/pages/add-vehicle.html"><i class="bi bi-plus-circle"></i> 添加职工车牌</button>
        <button type="button" class="tab-btn" data-page="/pages/reset-password.html"><i class="bi bi-arrow-repeat"></i> 重置网络密码</button>
        <button type="button" class="tab-btn" data-page="/pages/leave-cycle.html"><i class="bi bi-calendar2-check"></i> 学生周期请假</button>
    </div>

    <div class="page-frame-wrap" id="frameWrap" style="display:none;">
        <iframe id="pageFrame" class="page-frame" src="" frameborder="0"></iframe>
    </div>

    <div class="gate-overlay" id="gate">
        <div class="gate-card">
            <div class="gate-title">访问口令验证</div>
            <div class="gate-desc">请输入本页专用口令后继续访问。</div>
            <input type="password" id="gateCode" class="gate-input" placeholder="请输入访问口令" />
            <button type="button" id="gateBtn" class="gate-btn">进入管理中心</button>
            <div id="gateError" class="gate-error"></div>
        </div>
    </div>

    <script>
        (function () {
            var STORAGE_KEY = "autoAdminAccessOk";

            var gate = document.getElementById("gate");
            var gateInput = document.getElementById("gateCode");
            var gateBtn = document.getElementById("gateBtn");
            var gateError = document.getElementById("gateError");
            var frame = document.getElementById("pageFrame");
            var tabBar = document.getElementById("tabBar");
            var frameWrap = document.getElementById("frameWrap");
            var tabs = document.querySelectorAll(".tab-btn[data-page]");

            function initTabs() {
                var first = document.querySelector(".tab-btn[data-page].active");
                frame.src = first ? first.getAttribute("data-page") : "/pages/admin-review.html";
                tabBar.style.display = "";
                frameWrap.style.display = "";
                tabs.forEach(function (btn) {
                    btn.addEventListener("click", function () {
                        tabs.forEach(function (b) { b.classList.remove("active"); });
                        btn.classList.add("active");
                        frame.src = btn.getAttribute("data-page");
                    });
                });
            }

            function unlock() {
                gate.style.display = "none";
                if (window.localStorage) {
                    localStorage.setItem(STORAGE_KEY, "1");
                }
                initTabs();
            }

            fetch("/api/admin-gate-status")
                .then(function (r) { return r.json(); })
                .then(function (st) {
                    if (!st || !st.gate_enabled) {
                        unlock();
                        return;
                    }
                    // 已启用口令：必须向后端校验成功以写入管理员会话（否则审核接口会 401）。
                    // 不再用 localStorage 绕过，避免“界面解锁了但接口仍无权限”。
                    try {
                        if (window.localStorage) localStorage.removeItem(STORAGE_KEY);
                    } catch (e) {}

                    gateBtn.addEventListener("click", function () {
                        var v = (gateInput.value || "").trim();
                        if (!v) {
                            gateError.textContent = "请输入口令";
                            return;
                        }
                        gateBtn.disabled = true;
                        gateError.textContent = "";
                        fetch("/api/admin-gate-check", {
                            method: "POST",
                            headers: { "content-type": "application/json" },
                            body: JSON.stringify({ code: v })
                        })
                            .then(function (r) { return r.json(); })
                            .then(function (d) {
                                if (d && (d.ok || d.skip)) {
                                    gateError.textContent = "";
                                    unlock();
                                } else {
                                    gateError.textContent = "口令错误";
                                }
                            })
                            .catch(function () {
                                gateError.textContent = "校验失败，请稍后重试";
                            })
                            .finally(function () {
                                gateBtn.disabled = false;
                            });
                    });

                    gateInput.addEventListener("keydown", function (e) {
                        if (e.key === "Enter") {
                            gateBtn.click();
                        }
                    });
                })
                .catch(function () {
                    gateError.textContent = "无法连接服务，请确认已启动后端";
                });
        })();
    </script>
</body>
</html>
