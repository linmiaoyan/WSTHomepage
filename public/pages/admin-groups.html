<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理组与口令</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
</head>
<body class="p-3" style="max-width: 920px; margin: 0 auto;">
    <h1 class="h4 mb-3"><i class="bi bi-people"></i> 管理组与口令</h1>
    <p class="text-secondary small mb-4">
        仅<strong>主管理员</strong>（在管理中心入口输入 <code>ADMIN_MASTER_CODE</code> 对应口令）可配置。
        各组口令存于服务器数据库（哈希），请妥善保管。
    </p>

    <div id="err" class="alert alert-danger d-none"></div>

    <div class="card mb-4">
        <div class="card-header">新建管理组</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label small">显示名称</label>
                    <input type="text" id="newName" class="form-control form-control-sm" placeholder="例如：教务处" />
                </div>
                <div class="col-md-4">
                    <label class="form-label small">标识 slug（英文/数字/短横线）</label>
                    <input type="text" id="newSlug" class="form-control form-control-sm" placeholder="例如：jwc" />
                </div>
                <div class="col-md-4">
                    <label class="form-label small">组口令</label>
                    <input type="password" id="newCode" class="form-control form-control-sm" placeholder="该组专用口令" />
                </div>
            </div>
            <div class="mt-3">
                <div class="small fw-semibold mb-2">权限</div>
                <div id="permNew" class="d-flex flex-wrap gap-3"></div>
            </div>
            <button type="button" id="btnCreate" class="btn btn-primary btn-sm mt-3">创建</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">已有管理组</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>名称</th>
                            <th>slug</th>
                            <th>权限</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        var PERM_LABELS = {
            review_all: "审批 · 全部待办视图",
            review_vehicle: "审批 · 车牌",
            review_leave: "审批 · 周期请假",
            review_net: "审批 · 网络密码",
            review_seal: "审批 · 校章",
            admin_quick_ops: "快捷操作（车牌/网管/周期请假页）",
            admin_external: "原版子系统（QuickVote / TeacherDataSystem）",
            admin_groups: "本页：管理组配置",
        };

        function showErr(msg) {
            var el = document.getElementById("err");
            el.textContent = msg || "";
            el.classList.toggle("d-none", !msg);
        }

        function renderPermCheckboxes(containerId, selected) {
            var box = document.getElementById(containerId);
            box.innerHTML = "";
            var sel = {};
            (selected || []).forEach(function (x) { sel[x] = true; });
            Object.keys(PERM_LABELS).forEach(function (k) {
                var id = "p_" + containerId + "_" + k;
                var div = document.createElement("div");
                div.className = "form-check";
                div.innerHTML =
                    '<input class="form-check-input" type="checkbox" id="' + id + '" data-key="' + k + '"' +
                    (sel[k] ? " checked" : "") + ' />' +
                    '<label class="form-check-label small" for="' + id + '">' + PERM_LABELS[k] + "</label>";
                box.appendChild(div);
            });
        }

        function readChecked(containerId) {
            var out = [];
            document.querySelectorAll("#" + containerId + " input[type=checkbox]:checked").forEach(function (c) {
                out.push(c.getAttribute("data-key"));
            });
            return out;
        }

        function load() {
            showErr("");
            fetch("/api/admin/groups")
                .then(function (r) {
                    return r.json().then(function (d) {
                        if (!r.ok) throw new Error(d.msg || d.detail || r.status);
                        return d;
                    });
                })
                .then(function (d) {
                    var rows = (d.data || []);
                    var tb = document.getElementById("tbody");
                    tb.innerHTML = "";
                    rows.forEach(function (g) {
                        var tr = document.createElement("tr");
                        var permStr = (g.permissions || []).join(", ");
                        tr.innerHTML =
                            "<td>" + g.id + "</td>" +
                            "<td>" + escapeHtml(g.name) + "</td>" +
                            "<td><code>" + escapeHtml(g.slug) + "</code></td>" +
                            "<td class=\"small\">" + escapeHtml(permStr) + "</td>" +
                            "<td><button type=\"button\" class=\"btn btn-outline-danger btn-sm\" data-del=\"" + g.id + "\">删除</button></td>";
                        tb.appendChild(tr);
                    });
                    tb.querySelectorAll("button[data-del]").forEach(function (btn) {
                        btn.addEventListener("click", function () {
                            var id = btn.getAttribute("data-del");
                            if (!confirm("确定删除该管理组？")) return;
                            fetch("/api/admin/groups/" + id, { method: "DELETE" })
                                .then(function (r) {
                                    return r.json().then(function (d) {
                                        if (!r.ok) throw new Error(d.msg || r.status);
                                        return d;
                                    });
                                })
                                .then(function () { load(); })
                                .catch(function (e) { showErr(e.message || String(e)); });
                        });
                    });
                })
                .catch(function (e) {
                    showErr(e.message || String(e));
                });
        }

        function escapeHtml(s) {
            return String(s == null ? "" : s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        document.getElementById("btnCreate").addEventListener("click", function () {
            showErr("");
            var name = (document.getElementById("newName").value || "").trim();
            var slug = (document.getElementById("newSlug").value || "").trim();
            var code = (document.getElementById("newCode").value || "").trim();
            var perms = readChecked("permNew");
            fetch("/api/admin/groups", {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({ name: name, slug: slug, code: code, permissions: perms }),
            })
                .then(function (r) {
                    return r.json().then(function (d) {
                        if (!r.ok) throw new Error(d.msg || d.detail || r.status);
                        return d;
                    });
                })
                .then(function () {
                    document.getElementById("newName").value = "";
                    document.getElementById("newSlug").value = "";
                    document.getElementById("newCode").value = "";
                    renderPermCheckboxes("permNew", Object.keys(PERM_LABELS));
                    load();
                })
                .catch(function (e) {
                    showErr(e.message || String(e));
                });
        });

        renderPermCheckboxes("permNew", Object.keys(PERM_LABELS));
        load();
    </script>
</body>
</html>
