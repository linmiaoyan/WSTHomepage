<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>问卷填写</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
    <style>
        .wrap { max-width: 720px; margin: 18px auto; padding: 0 14px 40px; }
        .cardx {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem 1.35rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .muted { color: var(--text-secondary); font-size: 13px; }
        .mini-nav { font-size: 14px; padding: 10px 0; text-align: center; color: var(--text-secondary); }
        .mini-nav a { color: var(--primary-blue); text-decoration: none; }
    </style>
</head>
<body>
<div class="mini-nav">
    <a href="/home.html"><i class="bi bi-house-door"></i> 返回门户首页</a>
</div>

<div class="wrap">
    <div class="cardx mb-3" id="gate" style="display:none;">
        <div class="h6 mb-2">请输入问卷编号</div>
        <div class="input-group">
            <input type="text" class="form-control" id="manualId" placeholder="由管理员提供的问卷 ID" />
            <button type="button" class="btn btn-primary" id="btnOpen"><i class="bi bi-arrow-right"></i> 打开</button>
        </div>
        <div class="muted mt-2">本页不含任何管理功能；提交后仅跳转到感谢页。</div>
    </div>

    <div id="formRoot" style="display:none;"></div>
</div>

<script>
(function () {
    var STORE_S = "wst_qv_surveys_v1";
    var STORE_R = "wst_qv_responses_v1";

    function esc(s) {
        if (s === null || s === undefined) return "";
        return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    function getId() {
        try {
            return (new URLSearchParams(location.search).get("id") || "").trim();
        } catch (e) {
            return "";
        }
    }

    function loadLocalSurvey(id) {
        try {
            var map = JSON.parse(localStorage.getItem(STORE_S) || "{}");
            return map[id] || null;
        } catch (e) {
            return null;
        }
    }

    function saveLocalResponse(id, payload) {
        var all = {};
        try { all = JSON.parse(localStorage.getItem(STORE_R) || "{}"); } catch (e) { all = {}; }
        if (!Array.isArray(all[id])) all[id] = [];
        all[id].unshift(payload);
        localStorage.setItem(STORE_R, JSON.stringify(all));
    }

    function thanksRedirect() {
        var u = new URL(location.href);
        u.pathname = u.pathname.replace(/quickvote-fill\.html$/, "quickvote-thanks.html");
        u.search = "";
        u.hash = "";
        location.href = u.toString();
    }

    function render(survey, id) {
        var root = document.getElementById("formRoot");
        root.style.display = "";
        var qs = Array.isArray(survey.questions) ? survey.questions : [];
        var html = "";
        html += '<div class="cardx mb-3"><h1 class="h5 mb-1">' + esc(survey.title || "问卷") + '</h1>';
        html += '<p class="muted mb-0">请如实填写；提交后不可修改。</p></div>';
        html += '<form class="cardx" id="qvform">';
        qs.forEach(function (q, idx) {
            var qid = q.id || ("q" + idx);
            html += '<div class="mb-3">';
            html += '<label class="form-label">' + esc(q.text || ("题目 " + (idx + 1))) + "</label>";
            if (q.type === "radio") {
                var opts = Array.isArray(q.options) ? q.options : [];
                opts.forEach(function (opt, j) {
                    var oid = qid + "_" + j;
                    html += '<div class="form-check">';
                    html += '<input class="form-check-input" type="radio" name="' + esc(qid) + '" value="' + esc(opt) + '" id="' + esc(oid) + '" ' + (j === 0 ? "required" : "") + " />";
                    html += '<label class="form-check-label" for="' + esc(oid) + '">' + esc(opt) + "</label>";
                    html += "</div>";
                });
            } else {
                html += '<textarea class="form-control" name="' + esc(qid) + '" rows="3" required></textarea>';
            }
            html += "</div>";
        });
        html += '<button type="submit" class="btn btn-primary" id="btnSend"><i class="bi bi-send"></i> 提交</button>';
        html += "</form>";
        root.innerHTML = html;

        document.getElementById("qvform").addEventListener("submit", function (e) {
            e.preventDefault();
            var fd = new FormData(e.target);
            var answers = {};
            qs.forEach(function (q, idx) {
                var qid = q.id || ("q" + idx);
                if (q.type === "radio") {
                    answers[qid] = fd.get(qid);
                } else {
                    answers[qid] = fd.get(qid);
                }
            });
            var payload = { survey_id: id, answers: answers, submitted_at: new Date().toISOString() };
            var btn = document.getElementById("btnSend");
            btn.disabled = true;
            fetch("/api/quickvote/submit", {
                method: "POST",
                credentials: "same-origin",
                headers: { "content-type": "application/json" },
                body: JSON.stringify(payload)
            })
                .then(function (r) { return r.json().then(function (d) { return { r: r, d: d }; }); })
                .then(function (_ref) {
                    var r = _ref.r;
                    var d = _ref.d;
                    if (r.ok && d && d.ok) {
                        thanksRedirect();
                        return;
                    }
                    throw new Error("fallback");
                })
                .catch(function () {
                    saveLocalResponse(id, payload);
                    thanksRedirect();
                });
        });
    }

    function boot(id) {
        document.getElementById("gate").style.display = "none";
        fetch("/api/quickvote/survey/" + encodeURIComponent(id), { credentials: "same-origin" })
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (d && d.ok && d.data) {
                    render(d.data, id);
                    return;
                }
                throw new Error("local");
            })
            .catch(function () {
                var s = loadLocalSurvey(id);
                if (!s) {
                    document.getElementById("formRoot").style.display = "";
                    document.getElementById("formRoot").innerHTML = '<div class="cardx text-danger">未找到问卷：请检查链接或问卷编号。</div>';
                    return;
                }
                render(s, id);
            });
    }

    var id = getId();
    if (!id) {
        document.getElementById("gate").style.display = "";
        document.getElementById("btnOpen").addEventListener("click", function () {
            var v = (document.getElementById("manualId").value || "").trim();
            if (!v) return;
            location.search = "?id=" + encodeURIComponent(v);
        });
    } else {
        boot(id);
    }
})();
</script>
</body>
</html>
