<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>感谢您的参与</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
    <style>
        .wrap { max-width: 560px; margin: 48px auto; padding: 0 20px; text-align: center; }
        .cardx {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .muted { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
        .btn-home {
            display: inline-block;
            margin-top: 1.25rem;
            padding: 10px 22px;
            border-radius: 8px;
            background: var(--primary-blue);
            color: #fff !important;
            text-decoration: none;
            font-weight: 600;
        }
        .btn-home:hover { background: var(--primary-blue-dark); color: #fff !important; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="cardx">
        <div class="display-6 mb-3" style="font-size: 2.5rem;">✓</div>
        <h1 class="h4 mb-2">提交成功</h1>
        <p class="muted mb-0">感谢您的参与。您可以关闭本页，或返回门户首页。</p>
        <a class="btn-home" href="/home.html"><i class="bi bi-house-door"></i> 返回门户首页</a>
    </div>
    <p class="muted mt-3" style="font-size: 12px;">本页不包含任何管理或统计入口。</p>
</div>
</body>
</html>
