<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重置网络密码 - 管理中心</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
    <style>
        .form-card {
            background-color: var(--bg-white);
            border-radius: 10px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            max-width: 520px;
        }
        .form-card .form-label { color: var(--text-secondary); font-weight: 500; margin-bottom: 0.35rem; }
        .form-card .form-control { border-color: var(--border-color); border-radius: 6px; }
        .form-card .form-control:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15); }
        .btn-primary-custom {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-weight: 500;
        }
        .btn-primary-custom:hover { background-color: var(--primary-blue-dark); color: white; }
        .btn-primary-custom:disabled { opacity: 0.65; cursor: not-allowed; }
        .btn-outline-custom {
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            background: transparent;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .btn-outline-custom:hover { background: rgba(37, 99, 235, 0.1); color: var(--primary-blue); }
        #statusMsg { min-height: 1.5rem; font-size: 0.875rem; margin-top: 0.75rem; }
        #statusMsg.ok { color: var(--success-color); }
        #statusMsg.err { color: var(--danger-color); }
        .user-list-reset { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .user-list-reset .user-item {
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-gray);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .user-list-reset .user-item:hover, .user-list-reset .user-item.selected {
            border-color: var(--primary-blue);
            background: rgba(37, 99, 235, 0.12);
            color: var(--primary-blue);
        }
        .config-card { margin-bottom: 1.25rem; padding: 1rem; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-white); max-width: 520px; }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <h1><i class="bi bi-key"></i> 重置网络密码</h1>
            <p class="text-secondary mb-0">校园网管地址与 Token 由服务器 <code>.env</code>（CAMPUS_BASE、CAMPUS_TOKEN）提供；请先打开「管理中心」并完成访问口令（若已配置 ADMIN_GATE_CODE）。</p>
        </header>

        <div class="config-card">
            <div class="form-label small text-secondary mb-0">
                若仅在本地调试且已在 <code>.env</code> 设置 <code>CAMPUS_ALLOW_CLIENT_OVERRIDE=1</code>，可用下方覆盖；否则请勿填写，后端将忽略。
            </div>
            <div class="mb-2 mt-2">
                <label class="form-label small">平台 Base URL（可选）</label>
                <input type="text" class="form-control" id="baseUrl" placeholder="留空则使用服务器配置" autocomplete="off" />
            </div>
            <div class="mb-2">
                <label class="form-label small">x-uni-crsf-token / roarand（可选）</label>
                <input type="text" class="form-control" id="csrfToken" placeholder="留空则使用服务器配置" autocomplete="off" />
            </div>
        </div>

        <div class="form-card">
            <div class="form-label">选择用户</div>
            <div class="mb-2">
                <label class="form-label small">用户 ID（UUID）</label>
                <input type="text" class="form-control" id="userId" placeholder="例如 0632c4ed-b4b2-4522-96f2-0c36332a86ba" />
            </div>
            <div class="mb-2">
                <label class="form-label small">用户名（userName，用于显示/提交）</label>
                <input type="text" class="form-control" id="userName" placeholder="例如 13736354694" />
            </div>
            <div class="mb-2">
                <label class="form-label small">按用户名搜索（可选，需填写用户组 ID）</label>
                <div class="d-flex gap-2 flex-wrap">
                    <input type="text" class="form-control" id="userGroupId" placeholder="userGroupId 可选" style="max-width: 280px;" />
                    <input type="text" class="form-control" id="searchUserName" placeholder="用户名" style="max-width: 140px;" />
                    <button type="button" class="btn btn-outline-custom" id="searchUserBtn">搜索</button>
                </div>
                <div class="user-list-reset" id="userListResult"></div>
            </div>

            <hr class="my-3" />

            <div class="mb-3">
                <label class="form-label" for="newPassword">新密码<span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="newPassword" placeholder="请输入新密码" autocomplete="new-password" />
            </div>
            <div class="mb-4">
                <label class="form-label" for="passwordConfirm">确认新密码<span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="passwordConfirm" placeholder="再次输入新密码" autocomplete="new-password" />
            </div>
            <button type="button" class="btn btn-primary-custom" id="resetBtn">
                <i class="bi bi-check-lg"></i> 重置密码
            </button>
            <div id="statusMsg"></div>
        </div>
    </div>

    <script src="/js/reset-password.js"></script>
</body>
</html>
