<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教师数据管理</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/bootstrap-icons.css" />
    <style>
        .wrap { max-width: 1000px; margin: 18px auto; padding: 0 14px 24px; }
        .cardx {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .muted { color: var(--text-secondary); font-size: 13px; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="cardx mb-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
            <div>
                <div class="h5 mb-1"><i class="bi bi-person-vcard"></i> 教师数据管理</div>
                <div class="muted">从统一接口读取已提交记录；若接口未实现，可读取本机演示数据（与填报页同一浏览器）。</div>
            </div>
            <div class="d-flex gap-2 flex-wrap">
                <button type="button" class="btn btn-outline-secondary btn-sm" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i> 刷新</button>
                <button type="button" class="btn btn-outline-primary btn-sm" id="exportBtn"><i class="bi bi-download"></i> 导出 JSON</button>
            </div>
        </div>
        <div class="muted mt-2" id="hint"></div>
    </div>

    <div class="cardx">
        <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>部门</th>
                        <th>手机</th>
                        <th>提交时间</th>
                        <th style="width: 120px;">操作</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="5" class="text-center muted">加载中…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    var LS_KEY = "wst_teacher_data_local_v1";
    var rows = [];

    function esc(s) {
        if (s === null || s === undefined) return "";
        return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }
    function fmt(t) {
        if (!t) return "-";
        try { return new Date(t).toLocaleString("zh-CN"); } catch (e) { return t; }
    }

    function loadLocal() {
        try {
            var list = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
            return Array.isArray(list) ? list : [];
        } catch (e) {
            return [];
        }
    }

    function render() {
        var tbody = document.getElementById("tbody");
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center muted">暂无记录</td></tr>';
            document.getElementById("hint").textContent = "提示：打开教师填报页提交后，若后端未配置，数据仅存本机。";
            return;
        }
        tbody.innerHTML = rows.map(function (r, idx) {
            return (
                "<tr>" +
                "<td>" + esc(r.name) + "</td>" +
                "<td>" + esc(r.dept) + "</td>" +
                "<td>" + esc(r.mobile) + "</td>" +
                "<td>" + esc(fmt(r.submitted_at)) + "</td>" +
                "<td><button type=\"button\" class=\"btn btn-link btn-sm p-0\" data-idx=\"" + idx + "\">详情</button></td>" +
                "</tr>"
            );
        }).join("");
        document.getElementById("hint").textContent = "共 " + rows.length + " 条";
        tbody.querySelectorAll("button[data-idx]").forEach(function (btn) {
            btn.addEventListener("click", function () {
                var i = parseInt(btn.getAttribute("data-idx"), 10);
                var r = rows[i];
                alert(JSON.stringify(r, null, 2));
            });
        });
    }

    function loadList() {
        document.getElementById("hint").textContent = "加载中…";
        fetch("/api/teacher-data/list", { credentials: "same-origin" })
            .then(function (r) { return r.json().then(function (d) { return { r: r, d: d }; }); })
            .then(function (_ref) {
                var r = _ref.r;
                var d = _ref.d;
                if (r.ok && d && d.ok && Array.isArray(d.data)) {
                    rows = d.data;
                    render();
                    return;
                }
                throw new Error("fallback");
            })
            .catch(function () {
                rows = loadLocal();
                render();
                document.getElementById("hint").textContent =
                    "接口不可用，已显示本机演示数据（" + rows.length + " 条）。正式环境请实现 GET /api/teacher-data/list。";
            });
    }

    document.getElementById("refreshBtn").addEventListener("click", loadList);
    document.getElementById("exportBtn").addEventListener("click", function () {
        var blob = new Blob([JSON.stringify(rows, null, 2)], { type: "application/json;charset=utf-8" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "teacher-data-" + Date.now() + ".json";
        a.click();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 500);
    });

    loadList();
})();
</script>
</body>
</html>
