<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教师申请</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/bootstrap-icons.css" />
  <style>
    body { background: #f6f8fb; }
    .wrap { max-width: 1000px; margin: 26px auto; padding: 0 20px; }
    .cardx { background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .muted { color: var(--text-secondary); font-size: 13px; }
    #status.ok { color: var(--success-color); }
    #status.err { color: var(--danger-color); white-space: pre-wrap; }
    textarea { resize: vertical; }
    pre { white-space: pre-wrap; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    /* 与管理中心 index.html 一致的标签栏 */
    .tab-bar {
      max-width: 1000px;
      margin: 0 auto 10px;
      padding: 0 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid var(--border-color);
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--bg-white);
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .tab-btn.active {
      background: var(--primary-blue);
      color: #fff;
      border-color: var(--primary-blue);
    }
    .teacher-panel-wrap {
      max-width: 1000px;
      margin: 0 auto 24px;
      padding: 0 20px;
    }
    .teacher-panel {
      display: none;
    }
    .teacher-panel.active {
      display: block;
    }
    .teacher-seal-frame {
      width: 100%;
      height: min(78vh, 820px);
      min-height: 520px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      background: #fff;
    }
    .admin-entry-col {
      flex: 0 0 auto;
      padding-top: 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="cardx mb-3">
      <div class="d-flex align-items-start flex-wrap gap-3">
        <!-- 管理员入口：卡片最左侧独立一列 -->
        <div class="admin-entry-col">
          <a class="btn btn-outline-secondary btn-sm" href="/index.html" target="_blank" rel="noopener" title="管理中心"><i class="bi bi-person-badge"></i> 管理员入口</a>
        </div>
        <div class="flex-grow-1" style="min-width: 200px;">
          <div class="h5 mb-1"><i class="bi bi-chat-square-text"></i> 教师申请</div>
          <div class="muted mb-0">使用下方标签切换：<strong>快速申请</strong>（一句话解析入队）、<strong>校章申请</strong>（上传 PDF 选点）。左侧为管理员后台入口。</div>
        </div>
        <div class="d-flex flex-column align-items-end gap-1 ms-md-auto">
          <div class="d-flex gap-2 flex-wrap align-items-center justify-content-end">
            <span class="muted" id="meHint">未登录</span>
            <button type="button" class="btn btn-primary btn-sm" id="h5LoginBtn" style="display:none;"><i class="bi bi-lightning-charge"></i> 钉钉内登录</button>
            <a class="btn btn-outline-primary btn-sm" id="loginBtn" href="/auth/dingtalk/login?next=%2Fteacher.html"><i class="bi bi-qr-code-scan"></i> 钉钉扫码登录</a>
            <a class="btn btn-outline-secondary btn-sm" id="logoutBtn" href="/auth/logout" style="display:none;"><i class="bi bi-box-arrow-right"></i> 退出</a>
          </div>
          <div class="muted small text-end" id="dingtalkEnvHint" style="max-width: 420px;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-bar" id="teacherTabBar" role="tablist">
    <button type="button" class="tab-btn active" id="tabQuick" data-panel="panelQuick" role="tab" aria-selected="true"><i class="bi bi-lightning-charge"></i> 快速申请</button>
    <button type="button" class="tab-btn" id="tabSeal" data-panel="panelSeal" role="tab" aria-selected="false"><i class="bi bi-patch-check"></i> 校章申请</button>
  </div>

  <div class="teacher-panel-wrap">
    <div class="teacher-panel active" id="panelQuick" role="tabpanel" aria-labelledby="tabQuick">
      <div class="cardx mb-0">
        <div class="mb-2"><b>自然语言申请（解析入队）</b></div>
        <div class="muted small mb-2">用一句话描述需求，解析确认后提交到审批队列。</div>
        <textarea id="nlpText" class="form-control" rows="3" placeholder="例如：帮我给周秀东加一个临时车牌 浙CDJ9405 开一年"></textarea>
        <div class="d-flex gap-2 mt-2 flex-wrap align-items-center">
          <button class="btn btn-primary" id="parseBtn"><i class="bi bi-magic"></i> 解析</button>
          <div id="status" class="muted"></div>
        </div>
      </div>
    </div>

    <div class="teacher-panel" id="panelSeal" role="tabpanel" aria-labelledby="tabSeal">
      <iframe id="sealFrame" class="teacher-seal-frame" src="" title="校章申请" frameborder="0"></iframe>
      <div class="muted small mt-2">提示：校章申请在上方区域内完成；也可<a href="/seal.html" target="_blank" rel="noopener">新窗口打开完整页</a>。</div>
    </div>
  </div>

  <!-- Parse Modal -->
  <div class="modal fade" id="parseModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">解析结果</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="alert alert-info py-2 small">
            请确认以下信息无误。若有不对，可以直接修改 JSON（仅改动 <span class="mono">params</span> 部分也可以）。
          </div>
          <pre class="mono mb-0" id="parsePreview"></pre>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-success" id="enqueueBtn"><i class="bi bi-send"></i> 入队（提交申请）</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/bootstrap.bundle.min.js"></script>
  <script src="/js/dingtalk-h5-login.js"></script>
  <script>
    const API_PARSE = "/api/request-parse";
    const API_CREATE = "/api/requests";
    const API_ME = "/api/me";

    const modalEl = document.getElementById("parseModal");
    const modal = new bootstrap.Modal(modalEl);
    let lastParsed = null;
    let sealFrameLoaded = false;

    function setStatus(text, type) {
      const el = document.getElementById("status");
      el.textContent = text || "";
      el.className = type ? type : "muted";
    }

    function initTeacherTabs() {
      const tabs = document.querySelectorAll("#teacherTabBar .tab-btn");
      const panels = {
        panelQuick: document.getElementById("panelQuick"),
        panelSeal: document.getElementById("panelSeal"),
      };
      const sealFrame = document.getElementById("sealFrame");

      tabs.forEach(function (btn) {
        btn.addEventListener("click", function () {
          const pid = btn.getAttribute("data-panel");
          tabs.forEach(function (b) {
            b.classList.remove("active");
            b.setAttribute("aria-selected", "false");
          });
          btn.classList.add("active");
          btn.setAttribute("aria-selected", "true");
          Object.keys(panels).forEach(function (key) {
            const p = panels[key];
            if (!p) return;
            const on = key === pid;
            p.classList.toggle("active", on);
          });
          if (pid === "panelSeal" && !sealFrameLoaded) {
            sealFrame.src = "/seal.html?embed=1";
            sealFrameLoaded = true;
          }
        });
      });
    }

    async function loadMe() {
      try {
        const r = await fetch(API_ME);
        const d = await r.json().catch(()=>({}));
        const hint = document.getElementById("meHint");
        const loginBtn = document.getElementById("loginBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        if (d && d.logged_in && d.user) {
          const u = d.user;
          hint.textContent = "已登录：" + (u.summary || u.display_name || u.name || u.nick || u.userId || "未知");
          hint.className = "muted";
          loginBtn.style.display = "none";
          logoutBtn.style.display = "";
        } else {
          hint.textContent = "未登录（建议先用钉钉扫码）";
          hint.className = "muted";
          loginBtn.style.display = "";
          logoutBtn.style.display = "none";
        }
      } catch (e) {
        // ignore
      }
    }

    async function parseNlp() {
      const t = (document.getElementById("nlpText").value || "").trim();
      if (!t) return setStatus("请输入一句话。", "err");
      document.getElementById("parseBtn").disabled = true;
      setStatus("解析中…", "muted");
      try {
        const r = await fetch(API_PARSE, { method:"POST", headers:{ "content-type":"application/json" }, body: JSON.stringify({ text: t }) });
        const d = await r.json().catch(()=>({}));
        if (!r.ok || !d.ok) { setStatus("解析失败：" + (d.msg || r.status), "err"); return; }
        lastParsed = d.data;
        document.getElementById("parsePreview").textContent = JSON.stringify(lastParsed, null, 2);
        setStatus("解析完成，请确认。", "ok");
        modal.show();
      } catch (e) {
        setStatus("请求失败：" + e.message, "err");
      } finally {
        document.getElementById("parseBtn").disabled = false;
      }
    }

    async function enqueue() {
      if (!lastParsed) return;
      const raw = document.getElementById("parsePreview").textContent || "";
      let obj = null;
      try { obj = JSON.parse(raw); } catch (e) { setStatus("JSON 格式错误：" + e.message, "err"); return; }
      document.getElementById("enqueueBtn").disabled = true;
      try {
        const r = await fetch(API_CREATE, { method:"POST", headers:{ "content-type":"application/json" }, body: JSON.stringify(obj) });
        const d = await r.json().catch(()=>({}));
        if (r.status === 401 && d && d.need_login) {
          window.location.href = "/auth/dingtalk/login?next=%2Fteacher.html";
          return;
        }
        if (!r.ok || !d.ok) { setStatus("入队失败：" + (d.msg || r.status), "err"); return; }
        modal.hide();
        setStatus("已入队，ID=" + d.id + "（等待管理员审核）", "ok");
      } catch (e) {
        setStatus("请求失败：" + e.message, "err");
      } finally {
        document.getElementById("enqueueBtn").disabled = false;
      }
    }

    document.getElementById("parseBtn").addEventListener("click", parseNlp);
    document.getElementById("enqueueBtn").addEventListener("click", enqueue);
    initTeacherTabs();
    loadMe();
  </script>
</body>
</html>
