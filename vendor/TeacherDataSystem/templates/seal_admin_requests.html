<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公章审批</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { padding: 20px; background: #f5f5f5; }
        .container { max-width: 1100px; margin: 0 auto; }
        .table td, .table th { vertical-align: middle; }
        .code-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 10px;
            max-height: 260px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 12px;
        }
        iframe.pdf-viewer { width: 100%; height: 420px; border: 1px solid #e9ecef; background: #fff; }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-shield-check"></i> 公章审批队列</h2>
        <div class="text-muted" id="queueHint">加载中…</div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="d-flex gap-2 mb-2">
                <button class="btn btn-outline-primary btn-sm" onclick="loadQueue('pending')">待审批</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="loadQueue()">全部</button>
            </div>

            <table class="table table-striped table-sm" id="queueTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>教师</th>
                        <th>状态</th>
                        <th>盖章点数</th>
                        <th>提交时间</th>
                        <th>备注</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="7" class="text-center text-muted">加载中…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- detail modal -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">申请详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <div class="text-muted mb-2">PDF预览</div>
                            <iframe class="pdf-viewer" id="pdfFrame" src="about:blank"></iframe>
                        </div>
                        <div class="col-md-4">
                            <div class="text-muted mb-2">盖章位置（JSON）</div>
                            <div class="code-box" id="posBox"></div>
                            <div class="mt-2">
                                <div class="text-muted mb-1">管理员审批信息</div>
                                <div class="small" id="reviewBox"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = '/api';
    const adminToken = localStorage.getItem('admin_token') || '';

    function setQueueHint(text) {
        const el = document.getElementById('queueHint');
        if (el) el.textContent = text || '';
    }

    function formatDate(v) {
        if (!v) return '-';
        try { return new Date(v).toLocaleString('zh-CN'); } catch (e) { return v; }
    }

    async function loadQueue(status) {
        setQueueHint('加载中…');
        const tbody = document.querySelector('#queueTable tbody');
        if (!tbody) return;
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">加载中…</td></tr>';
        try {
            const url = status ? `${API_BASE}/admin/seal-requests?status=${encodeURIComponent(status)}` : `${API_BASE}/admin/seal-requests`;
            const resp = await fetch(url, { headers: { 'X-Admin-Token': adminToken } });
            const data = await resp.json().catch(() => []);
            if (!resp.ok) throw new Error(data.detail || data.msg || '加载失败');

            if (!Array.isArray(data) || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">暂无记录</td></tr>';
                setQueueHint('暂无记录');
                return;
            }

            tbody.innerHTML = data.map(it => {
                const st = it.status || '';
                const stTag = st === 'pending' ? '<span class="badge text-bg-secondary">待审批</span>' :
                               st === 'approved' ? '<span class="badge text-bg-success">通过</span>' :
                               st === 'rejected' ? '<span class="badge text-bg-danger">驳回</span>' :
                               '<span class="badge text-bg-light">未知</span>';
                const remark = it.remark ? String(it.remark).slice(0, 12) : '';
                const stampCount = it.stamp_count ?? 0;
                return `
                    <tr>
                        <td>${it.id}</td>
                        <td>${it.teacher_name || ''}</td>
                        <td>${stTag}</td>
                        <td>${stampCount}</td>
                        <td>${formatDate(it.created_at)}</td>
                        <td>${remark ? remark + '…' : '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="openDetail(${it.id})">查看</button>
                            <button class="btn btn-sm btn-success ms-1" ${st === 'pending' ? '' : 'disabled'} onclick="review(${it.id}, true)">通过</button>
                            <button class="btn btn-sm btn-danger ms-1" ${st === 'pending' ? '' : 'disabled'} onclick="review(${it.id}, false)">驳回</button>
                        </td>
                    </tr>
                `;
            }).join('');
            setQueueHint(`共 ${data.length} 条`);
        } catch (e) {
            console.error(e);
            setQueueHint('加载失败');
            tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">${e.message}</td></tr>`;
        }
    }

    async function openDetail(id) {
        const modalEl = document.getElementById('detailModal');
        const modal = new bootstrap.Modal(modalEl);

        document.getElementById('pdfFrame').src = `${API_BASE}/admin/seal-requests/${id}/pdf`;
        document.getElementById('posBox').textContent = '加载中…';
        document.getElementById('reviewBox').textContent = '';

        try {
            const resp = await fetch(`${API_BASE}/admin/seal-requests/${id}`, { headers: { 'X-Admin-Token': adminToken } });
            const data = await resp.json();
            document.getElementById('posBox').textContent = JSON.stringify(data.stamp_positions || [], null, 2);
            const rb = [];
            if (data.status) rb.push('状态：' + data.status);
            if (data.reviewed_at) rb.push('审批时间：' + formatDate(data.reviewed_at));
            if (data.review_comment) rb.push('审批意见：' + data.review_comment);
            document.getElementById('reviewBox').textContent = rb.join('\\n');
        } catch (e) {
            console.error(e);
            document.getElementById('posBox').textContent = '加载失败：' + e.message;
        } finally {
            modal.show();
        }
    }

    async function review(id, approved) {
        const comment = approved ? '' : (prompt('驳回意见（可选）') || '');
        const status = approved ? 'approved' : 'rejected';
        try {
            const resp = await fetch(`${API_BASE}/admin/seal-requests/${id}/review`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Token': adminToken
                },
                body: JSON.stringify({ status, comment })
            });
            const data = await resp.json().catch(() => ({}));
            if (!resp.ok || !data.ok) throw new Error(data.detail || data.msg || '审批失败');
            await loadQueue('pending');
        } catch (e) {
            alert('审批失败：' + e.message);
        }
    }

    loadQueue('pending');
</script>
</body>
</html>
